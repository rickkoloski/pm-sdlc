# Cross-Project Timing Defaults
# Default wait profiles by component type. Override with project-specific measurements.
# Last updated: 2026-02-22 (initial — from Rockcut playbook)

# Note: Playwright CLI waits for actionability automatically (element visible, enabled, stable).
# These timings are for explicit waits when auto-wait is insufficient.

page_navigation:
  description: "Time for React hydration + initial data fetch after route change"
  default_wait_ms: 2000
  notes: "Playwright CLI auto-waits for navigation, but async data fetch may not be covered"

datagrid_render:
  description: "Time for MUI DataGrid to initialize after page mount"
  default_wait_ms: 1500
  notes: "Grid initializes after React mount — columns, rows, virtualization"

api_data_fetch:
  description: "Time for API response + React Query cache hydration"
  default_wait_ms: 1000
  notes: "Varies by dataset size and server load"

formula_computation:
  local:
    description: "Arithmetic, ROUND, IF — synchronous formulas"
    default_wait_ms: 0
    notes: "Resolves instantly, no wait needed"
  remote:
    description: "Remote function calls (INVENTORY_ON_HAND, etc.)"
    default_wait_ms: 500
    notes: "Depends on API response time; dev harness uses 300-500ms simulated delay"

login_flow:
  description: "Auth request + redirect to home"
  default_wait_ms: 2000
  notes: "Includes POST to /api/session + client-side redirect"

dialog_open:
  description: "MUI Dialog animation + mount"
  default_wait_ms: 300
  notes: "MUI transitions take ~225ms by default"

dialog_close_after_save:
  description: "Mutation request + cache invalidation + dialog close"
  default_wait_ms: 1000
  notes: "Includes API round-trip + React Query invalidation + re-render"

client_side_filter:
  description: "useMemo recomputation after search input change"
  default_wait_ms: 100
  notes: "Nearly instant — no debounce, synchronous filter"

localstorage_persistence:
  description: "Write to localStorage + verify on reload"
  default_wait_ms: 0
  notes: "Synchronous — but test must include full page refresh, not just re-render (see gotcha: react-strictmode-double-mount)"
